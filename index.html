   All read/write goes through Netlify backend

   GitHub Pages, Hostinger, GoDaddy, etc.
   API keys stay safe on server side.
───────────────────────────────────────── */
const NETLIFY_BASE = "https://lumenoradvisorygroup-recruitment.netlify.app";

const POLL_MS      = 5000;

async function cloudRead(){
  try{
    const r=await fetch(SYNC_URL,{method:"GET"});
    if(!r.ok){
      const txt=await r.text();
      console.error("cloudRead HTTP",r.status,txt);
      return null;
    }
    const json=await r.json();
    const data=json.record!==undefined?json.record:json;
    console.log("☁️ cloudRead OK, applicants:",data?.applicants?.length);
    return data;
  }catch(e){console.error("cloudRead exception",e);return null;}
}
async function cloudWrite(data){
  try{
    const r=await fetch(SYNC_URL,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
    if(!r.ok){console.error("cloudWrite HTTP",r.status);return false;}
    return true;
  }catch(e){console.error("cloudWrite exception",e);return false;}
}

async function callAI(prompt,mode="text"){
  // AI calls go to Netlify function (absolute URL — works from any host)
  const AI_ENDPOINT="https://lumenoradvisorygroup-recruitment.netlify.app/api/ai";
  try{
    const r=await fetch(AI_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,mode})
    });
    const d=await r.json();
    if(!r.ok){console.error("AI error:",d.error);return "";}
    return d.result||"";
  }catch(e){console.error("callAI",e);return "";}
}
function exportCSV(rows,fn){
  if(!rows.length)return;
  const k=Object.keys(rows[0]);
  const csv=[k.join(","),...rows.map(r=>k.map(x=>JSON.stringify(r[x]??"")).join(","))].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=fn+".csv";a.click();
}

function Btn({children,onClick,variant="primary",size="md",disabled=false,style={}}){

/* ─────────────────────────────────────────
   APPLICANT PORTAL
───────────────────────────────────────── */
function ApplicantModule({positions,onApply,onBack}){
  const[step,ss]=useState(0);const[selPos,ssp]=useState(null);const[selLvl,ssl]=useState(null);
  const[form,sf]=useState({name:"",email:"",phone:"",address:""});const[answers,sa]=useState({});
  const[resumeFile,srf]=useState(null);const[errors,se]=useState({});const[submitting,ssub]=useState(false);
  const pos=positions.find(p=>p.id===selPos);const lvl=LEVELS.find(l=>l.id===selLvl);const qs=pos?.questions?.[selLvl]||[];
  function readFile(f){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f);});}
  function validate(){const e={};if(!form.name.trim())e.name="Required";if(!form.email.trim()||!/\S+@\S+\.\S+/.test(form.email))e.email="Valid email required";if(!form.phone.trim())e.phone="Required";if(!form.address.trim())e.address="Required";if(!resumeFile)e.resume="Resume required";qs.forEach((_,i)=>{if(!answers[i]?.trim())e[`q${i}`]="Required";});se(e);return !Object.keys(e).length;}
  async function handleSubmit(){
    if(!validate())return;
    ssub(true);
    const b64=resumeFile?await readFile(resumeFile):"";
    // Build AI scoring prompt from actual answers
    const posQuestions=pos.questions?.[selLvl]||[];
    const answersText=posQuestions.map((q,i)=>`Q${i+1}: ${q}\nA${i+1}: ${answers[i]||"No answer"}`).join("\n");
    const resumeHint=resumeFile?`Resume uploaded: ${resumeFile.name}`:"No resume uploaded";
    const scoringPrompt=`You are an HR screening AI for Lumenor Advisory Group. Score this ${selLvl}-level ${pos.label} applicant strictly from 0-100 based on their answers. Be objective and strict.

Position: ${pos.label}
Level: ${lvl.label}
${resumeHint}

Answers to screening questions:
${answersText}

Scoring criteria:
- Answer relevance and quality (40%)
- Experience level match for ${lvl.label} (30%)
- Communication clarity (20%)
- Resume submitted (10%)

Reply with ONLY a JSON object, nothing else:
{"score": <number 0-100>, "summary": "<2 sentences explaining the score>"}`;

    let score=70;
    let summary="";
    try{
      const aiResp=await callAI(scoringPrompt,"score");
      const cleaned=aiResp.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(cleaned);
      score=Math.min(100,Math.max(0,Math.round(parsed.score||70)));
      summary=parsed.summary||"";
    }catch(e){
      console.error("AI scoring failed, using fallback",e);
      // Fallback: score based on answer length/quality
      const totalAnswerLength=Object.values(answers).join(" ").length;
      score=resumeFile
        ?Math.min(95,60+Math.floor(totalAnswerLength/20))
        :Math.min(80,50+Math.floor(totalAnswerLength/20));
    }
    onApply({id:uid(),name:form.name,email:form.email,phone:form.phone,address:form.address,position:pos.label,positionId:pos.id,level:selLvl,levelLabel:lvl.label,resume:resumeFile?.name,resumeB64:b64,answers,score,status:score>=75?"passed":"failed",date:today(),summary,history:[score>=75?"passed":"failed"]});
    ssub(false);
    ss(4);
  }
  const bg="linear-gradient(135deg,#0a0a0a 0%,#0d150d 50%,#0a0a0a 100%)";
  if(step===4)return(<div style={{minHeight:"100vh",background:bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative"}}>
{onBack&&<div onClick={onBack} style={{position:"fixed",top:16,left:16,zIndex:100,display:"flex",alignItems:"center",gap:6,cursor:"pointer",background:"rgba(13,13,13,0.9)",border:"1px solid #2a2a2a",borderRadius:20,padding:"6px 14px",color:"#888",fontSize:12,fontWeight:600,backdropFilter:"blur(8px)"}}><span style={{fontSize:14}}>←</span> Home</div>}
<div style={{textAlign:"center",background:"#111",border:`1px solid ${BRAND}44`,borderRadius:24,padding:52,maxWidth:460,boxShadow:`0 0 60px ${BRAND}22`}}><div style={{width:80,height:80,borderRadius:"50%",background:BRAND,margin:"0 auto 24px",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 30px ${BRAND}88`}}><span style={{fontSize:38,color:"#000",fontWeight:800}}>✓</span></div><h2 style={{color:"#eee",marginBottom:12,fontSize:24}}>Application Submitted!</h2><p style={{color:"#777",lineHeight:1.8,marginBottom:28}}>Thank you! Please wait for our email regarding the status of your application.</p><Btn onClick={()=>{ss(0);sf({name:"",email:"",phone:"",address:""});sa({});srf(null);ssp(null);ssl(null);}} variant="outline">Apply for Another Position</Btn></div></div>);

  if(step===1)return(<div style={{minHeight:"100vh",background:bg,padding:32}}><div style={{maxWidth:620,margin:"0 auto"}}><div style={{display:"flex",alignItems:"center",gap:14,marginBottom:36}}><img src={LOGO} alt="Lumenor" style={{height:36}}/><h2 style={{margin:0,color:"#eee",fontWeight:800}}>Choose a Position</h2></div><div style={{display:"flex",flexDirection:"column",gap:12}}>{positions.map(p=><Card key={p.id} onClick={()=>{ssp(p.id);ss(2);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,color:"#eee",fontSize:16}}>{p.label}</div><div style={{color:"#666",fontSize:13,marginTop:3}}>3 experience levels available</div></div><span style={{color:BRAND,fontSize:22}}>→</span></Card>)}</div></div></div>);

es(employees.filter(x=>x.id!==e.id))} variant="danger" size="sm">Remove</Btn></div></Card>)}{mgrEmps.length===0&&<div style={{color:"#444",fontSize:12,gridColumn:"1/-1"}}>No employees assigned yet.</div>}</div></div>}<Modal open={addMM} onClose={()=>saddMM(false)} title="Add Manager"><Inp label="Full Name" value={newMgr.name} onChange={v=>snewMgr(m=>({...m,name:v}))} required/><Inp label="Role / Title" value={newMgr.role} onChange={v=>snewMgr(m=>({...m,role:v}))}/><LocSelect val={newMgr.location} onChange={v=>snewMgr(m=>({...m,location:v}))}/><div style={{display:"flex",gap:8}}><Btn onClick={()=>{if(!newMgr.name.trim())return;setManagers([...managers,{...newMgr,id:uid()}]);snewMgr({name:"",role:"",location:"Philippines"});saddMM(false);}}>Add Manager</Btn><Btn onClick={()=>saddMM(false)} variant="ghost">Cancel</Btn></div></Modal><Modal open={addEM} onClose={()=>saddEM(false)} title={`Add Employee under ${mgr?.name}`}><Inp label="Full Name" value={newEmp.name} onChange={v=>snewEmp(e=>({...e,name:v}))} required/><Inp label="Position / Role" value={newEmp.position} onChange={v=>snewEmp(e=>({...e,position:v}))}/><LocSelect val={newEmp.location} onChange={v=>snewEmp(e=>({...e,location:v}))}/><div style={{display:"flex",gap:8}}><Btn onClick={()=>{if(!newEmp.name.trim())return;setEmployees([...employees,{...newEmp,id:uid(),managerId:selMgr,salary:0,notes:"",contract:""}]);snewEmp({name:"",position:"",location:"Philippines"});saddEM(false);}}>Add Employee</Btn><Btn onClick={()=>saddEM(false)} variant="ghost">Cancel</Btn></div></Modal><Modal open={!!editEM} onClose={()=>seditEM(null)} title="Edit Employee"><Inp label="Full Name" value={editED.name} onChange={v=>seditED(d=>({...d,name:v}))}/><Inp label="Position" value={editED.position} onChange={v=>seditED(d=>({...d,position:v}))}/><div style={{display:"flex",gap:8}}><Btn onClick={()=>{setEmployees(employees.map(e=>e.id===editEM?{...e,...editED}:e));seditEM(null);}}>Save</Btn><Btn onClick={()=>seditEM(null)} variant="ghost">Cancel</Btn></div></Modal></div>);
}

/* ── Job Questionnaire ── */
function JobQuestionnaireTab({positions,setPositions}){
  const[selPos,ssp]=useState(positions[0]?.id||null);const[selLvl,ssl]=useState("entry");const[editingTitle,set]=useState(false);const[titleVal,stv]=useState("");const[delConfirm,sdc]=useState(false);
  const pos=positions.find(p=>p.id===selPos);const qs=pos?.questions?.[selLvl]||[];
  function updateQ(idx,val){setPositions(positions.map(p=>p.id===selPos?{...p,questions:{...p.questions,[selLvl]:p.questions[selLvl].map((q,i)=>i===idx?val:q)}}:p));}
  function addQ(){setPositions(positions.map(p=>p.id===selPos?{...p,questions:{...p.questions,[selLvl]:[...(p.questions[selLvl]||[]),"New question?"]}}:p));}
  function removeQ(idx){setPositions(positions.map(p=>p.id===selPos?{...p,questions:{...p.questions,[selLvl]:p.questions[selLvl].filter((_,i)=>i!==idx)}}:p));}
  function saveTitle(){if(!titleVal.trim())return;setPositions(positions.map(p=>p.id===selPos?{...p,label:titleVal}:p));set(false);}
  function deletePosition(){const next=positions.filter(p=>p.id!==selPos);setPositions(next);ssp(next[0]?.id||null);sdc(false);}
  return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><ST c="Job Questionnaire"/><Btn onClick={()=>{const id=uid();const np={id,label:"New Position",questions:{entry:["Describe your background."],mid:["Describe your experience."],senior:["Describe your leadership experience."]}};setPositions([...positions,np]);ssp(id);}} variant="outline" size="sm">+ Add Position</Btn></div><div style={{display:"flex",gap:18}}><div style={{width:180,flexShrink:0}}><div style={{fontSize:10,fontWeight:700,color:"#555",letterSpacing:.5,marginBottom:9,textTransform:"uppercase"}}>Positions</div>{positions.map(p=><div key={p.id} onClick={()=>{ssp(p.id);sdc(false);set(false);}} style={{padding:"9px 12px",borderRadius:7,marginBottom:5,cursor:"pointer",background:selPos===p.id?`${BRAND}22`:"#111",borderLeft:selPos===p.id?`3px solid ${BRAND}`:"3px solid transparent",color:selPos===p.id?"#eee":"#777",fontWeight:selPos===p.id?700:400,fontSize:13}}>{p.label}</div>)}</div>{pos&&<div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>{editingTitle?<><input value={titleVal} onChange={e=>stv(e.target.value)} autoFocus style={{flex:1,padding:"7px 11px",border:`1.5px solid ${BRAND}`,borderRadius:7,fontSize:15,fontWeight:700,background:"#0d0d0d",color:"#eee",outline:"none"}}/><Btn onClick={saveTitle} size="sm">Save</Btn><Btn onClick={()=>set(false)} variant="ghost" size="sm">Cancel</Btn></>:<><div style={{flex:1,fontSize:16,fontWeight:800,color:"#eee"}}>{pos.label}</div><Btn onClick={()=>{stv(pos.label);set(true);}} variant="outline" size="sm">✎ Rename</Btn><Btn onClick={()=>sdc(true)} variant="danger" size="sm">🗑 Delete</Btn></>}</div>{delConfirm&&<div style={{background:"#1a0a0a",border:"1px solid #e74c3c55",borderRadius:9,padding:"12px 14px",marginBottom:13,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}><span style={{color:"#e74c3c",fontSize:12,flex:1}}>Delete <b>{pos.label}</b>? Cannot be undone.</span><Btn onClick={deletePosition} variant="danger" size="sm">Yes, Delete</Btn><Btn onClick={()=>sdc(false)} variant="ghost" size="sm">Cancel</Btn></div>}<div style={{display:"flex",gap:7,marginBottom:16}}>{LEVELS.map(l=><button key={l.id} onClick={()=>ssl(l.id)} style={{padding:"7px 13px",borderRadius:7,border:selLvl===l.id?`1.5px solid ${BRAND}`:"1.5px solid #2a2a2a",background:selLvl===l.id?`${BRAND}22`:"#111",color:selLvl===l.id?BRAND:"#666",fontWeight:700,cursor:"pointer",fontSize:12}}>{l.label}</button>)}</div><div style={{marginBottom:10,padding:"6px 11px",background:"#0d0d0d",borderRadius:7,fontSize:11,color:"#555"}}>{LEVELS.find(l=>l.id===selLvl)?.sub}</div>{qs.map((q,i)=><div key={i} style={{display:"flex",gap:7,marginBottom:8,alignItems:"flex-start"}}><span style={{color:"#444",marginTop:9,fontWeight:700,minWidth:18,fontSize:12}}>{i+1}.</span><input value={q} onChange={e=>updateQ(i,e.target.value)} style={{flex:1,padding:"8px 11px",border:"1.5px solid #2a2a2a",borderRadius:7,fontSize:13,outline:"none",background:"#0d0d0d",color:"#eee"}} onFocus={e=>e.target.style.borderColor=BRAND} onBlur={e=>e.target.style.borderColor="#2a2a2a"}/><Btn onClick={()=>removeQ(i)} variant="danger" size="sm">✕</Btn></div>)}<div style={{marginTop:12}}><Btn onClick={addQ} variant="outline" size="sm">+ Add Question</Btn></div></div>}</div></div>);
}

/* ─────────────────────────────────────────
   ADMIN DASHBOARD — with cloud sync
───────────────────────────────────────── */
const TABS=[
  {id:"dashboard",label:"Dashboard",icon:"◈"},
  {id:"passed",label:"Passed",icon:"✓"},
  {id:"initial",label:"Initial Interview",icon:"💬"},
  {id:"final",label:"Final Interview",icon:"★"},
  {id:"hired",label:"Hired",icon:"♦"},
  {id:"waiting",label:"Waiting List",icon:"⏳"},
  {id:"failed",label:"Failed",icon:"✗"},
  {id:"departed",label:"Departed",icon:"🚪"},
  {id:"org",label:"Org Chart",icon:"◎"},
  {id:"managers",label:"Managers",icon:"◉"},
  {id:"questionnaire",label:"Job Questionnaire",icon:"❓"},
];

function AdminDashboard({onLogout}){
  const[tab,setTab]=useState("dashboard");
  const[collapsed,setCollapsed]=useState(false);
  const[mobileNavOpen,setMobileNavOpen]=useState(false);
  const isMobile=()=>window.innerWidth<=768;
  const[syncStatus,setSyncStatus]=useState("loading"); // loading | synced | saving | error | offline
  const[applicants,setApplicants]=useState([]);
  const[employees,setEmployees]=useState([]);
  const[managers,setManagers]=useState([]);
  const[org,setOrg]=useState(DEFAULT_ORG);
  const[positions,setPositions]=useState(DEFAULT_POSITIONS);
  const[initialized,setInitialized]=useState(false);
  const saveTimer=useRef(null);
  const lastRemoteHash=useRef("");
  const isConfigured=true; // credentials are set
  const[manualRefresh,setManualRefresh]=useState(0);

  // Hash state for change detection — full JSON so any field change is detected
  function hashState(s){try{return JSON.stringify(s);}catch{return "";}}

  // ── Initial load — ALWAYS prefer cloud over localStorage ──
  useEffect(()=>{
    async function init(){
      setSyncStatus("loading");
      // Always try cloud first — localStorage is only fallback
      let cloudData=null;
      let data=null;
      if(isConfigured){cloudData=await cloudRead();}
      if(cloudData){
        data=cloudData;
        // Also update localStorage to match cloud
        lsWrite(cloudData);
      } else {
        data=lsRead();
      }
      if(!data){data=DEFAULT_STATE;}
      setApplicants(data.applicants||DEFAULT_STATE.applicants);
      setEmployees(data.employees||DEFAULT_STATE.employees);
      setManagers(data.managers||DEFAULT_STATE.managers);
      setOrg(data.org||DEFAULT_ORG);
      setPositions(data.positions||DEFAULT_POSITIONS);
      lastRemoteHash.current=hashState(data);
      setSyncStatus(cloudData?"synced":"offline");
      setInitialized(true);
    }
    init();
  },[]);

  // ── Auto-save whenever state changes (debounced 1.5s) ──
  useEffect(()=>{
    if(!initialized)return;
    const data={applicants,employees,managers,org,positions};
    lsWrite(data); // always save locally immediately
    if(!isConfigured){setSyncStatus("offline");return;}
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setSyncStatus("saving");
    saveTimer.current=setTimeout(async()=>{
      const ok=await cloudWrite(data);
      setSyncStatus(ok?"synced":"error");
      if(ok)lastRemoteHash.current=hashState(data);
    },1500);
  },[applicants,employees,managers,org,positions,initialized]);

  // ── Shared function to apply remote data ──
  const applyRemote=useCallback(async(silent=true)=>{
    if(!isConfigured)return false;
    if(!silent)setSyncStatus("loading");
    const remote=await cloudRead();
    if(!remote){if(!silent)setSyncStatus("error");return false;}
    const remoteHash=hashState(remote);
    // Always apply if hash differs OR if silent=false (manual refresh)
    if(remoteHash!==lastRemoteHash.current||!silent){
      lastRemoteHash.current=remoteHash;
      setApplicants(remote.applicants||[]);
      setEmployees(remote.employees||[]);
      setManagers(remote.managers||[]);
      setOrg(remote.org||DEFAULT_ORG);
      setPositions(remote.positions||DEFAULT_POSITIONS);
      lsWrite(remote);
    }
    if(!silent)setSyncStatus("synced");
    return true;
  },[]);

  // ── Poll for remote changes every POLL_MS ──
  // Also track applicant count to force-detect new submissions
  const lastAppCount=useRef(0);
  useEffect(()=>{
    if(!isConfigured||!initialized)return;
    const interval=setInterval(async()=>{
      const remote=await cloudRead();
      if(!remote)return;
      const newCount=remote.applicants?.length||0;
      const remoteHash=hashState(remote);
      // Update if hash changed OR applicant count changed
      if(remoteHash!==lastRemoteHash.current||newCount!==lastAppCount.current){
        console.log("🔄 Sync update - applicants:",newCount);
        lastRemoteHash.current=remoteHash;
        lastAppCount.current=newCount;
        setApplicants(remote.applicants||[]);
        setEmployees(remote.employees||[]);
        setManagers(remote.managers||[]);
        setOrg(remote.org||DEFAULT_ORG);
        setPositions(remote.positions||DEFAULT_POSITIONS);
        lsWrite(remote);
      }
    },POLL_MS);
    return()=>clearInterval(interval);
  },[initialized,applyRemote]);

  // ── Manual refresh trigger ──
  useEffect(()=>{
    if(!initialized||manualRefresh===0)return;
    applyRemote(false);
  },[manualRefresh,initialized,applyRemote]);

  function upApp(id,data){setApplicants(prev=>prev.map(a=>a.id===id?{...a,...data}:a));}

  const waiting=applicants.filter(a=>a.status==="waiting-list").length;
  const failed=applicants.filter(a=>a.status==="failed").length;
  const W=collapsed?54:218;

  const syncLabel={loading:"Loading...",saving:"Saving...",synced:"✓ Synced",error:"⚠ Sync Error — Is bin PUBLIC?",offline:"Local Only"}[syncStatus];
  const syncColor={loading:"#f39c12",saving:"#f39c12",synced:BRAND,error:"#e74c3c",offline:"#888"}[syncStatus];

  function passedActions(a,move){return <><Btn onClick={()=>move(a,"initial-interview")} variant="outline" size="sm">→ Initial Interview</Btn><Btn onClick={()=>move(a,"failed",{failStage:"initial"})} variant="danger" size="sm">Mark Failed</Btn></>;}
  function initialActions(a,move,sea){return <><Btn onClick={()=>move(a,"final-interview")} variant="purple" size="sm">→ Final Interview</Btn><Btn onClick={()=>move(a,"failed",{failStage:"initial"})} variant="danger" size="sm">Mark Failed</Btn><Btn onClick={()=>sea(a)} variant="ghost" size="sm">✉ Email</Btn></>;}
  function finalActions(a,move,sea){return <><Btn onClick={()=>move(a,"hired")} variant="blue" size="sm">Hired ✓</Btn><Btn onClick={()=>move(a,"waiting-list")} variant="warn" size="sm">Waiting List</Btn><Btn onClick={()=>move(a,"failed",{failStage:"final"})} variant="danger" size="sm">Not Hired</Btn><Btn onClick={()=>sea(a)} variant="ghost" size="sm">✉ Email</Btn></>;}

  if(syncStatus==="loading")return(<div style={{minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><img src={LOGO} alt="Lumenor" style={{height:52,filter:`drop-shadow(0 0 16px ${BRAND}44)`}}/><div style={{color:BRAND,fontSize:14,fontWeight:600}}>Loading HR System...</div><div style={{width:40,height:3,background:`linear-gradient(90deg,${BRAND},transparent)`,borderRadius:2,animation:"none"}}></div></div>);

  return(<div className="admin-layout" style={{display:"flex",minHeight:"100vh",background:"#080808"}}>
    {/* Mobile Header */}
    <div className="mobile-header" style={{position:"fixed",top:0,left:0,right:0,zIndex:200,background:"#0d0d0d",borderBottom:"1px solid #1a1a1a",padding:"10px 14px",display:"none",alignItems:"center",justifyContent:"space-between",height:52}}>
      <img src={LOGO} alt="Lumenor" style={{height:24}}/>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{fontSize:9,color:syncColor,fontWeight:700}}>{syncLabel}</div>
        <div onClick={()=>setMobileNavOpen(o=>!o)} style={{cursor:"pointer",color:"#aaa",fontSize:20,lineHeight:1}}>☰</div>
      </div>
    </div>
    {/* Mobile Slide-over Nav */}
    {mobileNavOpen&&<div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,.7)"}} onClick={()=>setMobileNavOpen(false)}>
      <div onClick={e=>e.stopPropagation()} style={{position:"absolute",left:0,top:0,bottom:0,width:240,background:"#0d0d0d",borderRight:"1px solid #1a1a1a",display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid #1a1a1a",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}><img src={LOGO} alt="Lumenor" style={{height:28}}/><div style={{color:"#eee",fontWeight:800,fontSize:12}}>Lumenor<br/><span style={{color:"#444",fontSize:9,fontWeight:400}}>HR System</span></div></div>
          <div onClick={()=>setMobileNavOpen(false)} style={{color:"#555",cursor:"pointer",fontSize:18}}>✕</div>
        </div>
        <div style={{flex:1,padding:"8px 0"}}>
          {TABS.map(t=>{const active=tab===t.id;const badge=t.id==="waiting"?waiting:t.id==="failed"?failed:0;return(<div key={t.id} onClick={()=>{setTab(t.id);setMobileNavOpen(false);}} style={{padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,color:active?"#eee":"#555",background:active?`${BRAND}18`:"transparent",borderLeft:active?`3px solid ${BRAND}`:"3px solid transparent"}}><span style={{fontSize:14}}>{t.icon}</span><span style={{fontSize:13,fontWeight:active?700:500}}>{t.label}</span>{badge>0&&<span style={{marginLeft:"auto",background:t.id==="waiting"?"#f39c12":"#e74c3c",color:t.id==="waiting"?"#000":"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:8}}>{badge}</span>}</div>);})}
        </div>
        <div style={{padding:"8px 0",borderTop:"1px solid #1a1a1a"}}>
          <div style={{margin:"3px 12px 7px",padding:"5px 9px",borderRadius:6,background:"#111",border:`1px solid ${syncColor}44`,fontSize:10,color:syncColor,fontWeight:700,textAlign:"center"}}>{syncLabel}</div>
          <div onClick={()=>{setManualRefresh(n=>n+1);setMobileNavOpen(false);}} style={{margin:"0 12px 7px",padding:"5px 9px",borderRadius:6,background:"#0d1a0d",border:`1px solid ${BRAND}33`,fontSize:10,color:BRAND,fontWeight:700,textAlign:"center",cursor:"pointer"}}>⟳ Refresh Now</div>
          <div onClick={onLogout} style={{padding:"10px 16px",cursor:"pointer",color:"#e74c3c",fontSize:12,display:"flex",alignItems:"center",gap:7}}>⊗ Logout</div>
        </div>
      </div>
    </div>}
    {/* Sidebar — desktop only */}
    <div className="sidebar-desktop" style={{width:W,flexShrink:0,background:"#0d0d0d",borderRight:"1px solid #1a1a1a",transition:"width .25s",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:collapsed?"15px 10px":"14px 14px",borderBottom:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:9,justifyContent:collapsed?"center":"flex-start"}}>
        <img src={LOGO} alt="Lumenor" style={{height:collapsed?26:32,flexShrink:0,transition:"height .2s"}}/>
        {!collapsed&&<div style={{color:"#eee",fontWeight:800,fontSize:12,whiteSpace:"nowrap"}}>Lumenor<br/><span style={{color:"#444",fontSize:9,fontWeight:400}}>HR System</span></div>}
      </div>
      <div style={{flex:1,padding:"8px 0",overflowY:"auto"}}>
        {TABS.map(t=>{const active=tab===t.id;const badge=t.id==="waiting"?waiting:t.id==="failed"?failed:0;return(<div key={t.id} onClick={()=>setTab(t.id)} style={{padding:collapsed?"8px 0":"8px 13px",cursor:"pointer",display:"flex",alignItems:"center",gap:9,justifyContent:collapsed?"center":"flex-start",color:active?"#eee":"#555",background:active?`${BRAND}18`:"transparent",borderLeft:active?`3px solid ${BRAND}`:"3px solid transparent",transition:"all .15s"}}><span style={{fontSize:13,flexShrink:0,filter:active?`drop-shadow(0 0 5px ${BRAND})`:"none"}}>{t.icon}</span>{!collapsed&&<span style={{fontSize:12,fontWeight:active?700:500,whiteSpace:"nowrap"}}>{t.label}</span>}{!collapsed&&badge>0&&<span style={{marginLeft:"auto",background:t.id==="waiting"?"#f39c12":"#e74c3c",color:t.id==="waiting"?"#000":"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:8}}>{badge}</span>}</div>);})}
      </div>
      <div style={{padding:"8px 0",borderTop:"1px solid #1a1a1a"}}>
        {!collapsed&&<div style={{margin:"3px 9px 7px",padding:"5px 9px",borderRadius:6,background:"#111",border:`1px solid ${syncColor}44`,fontSize:10,color:syncColor,fontWeight:700,textAlign:"center",transition:"all .4s"}}>{syncLabel}</div>}
        {!collapsed&&<div onClick={()=>setManualRefresh(n=>n+1)} style={{margin:"0 9px 7px",padding:"5px 9px",borderRadius:6,background:"#0d1a0d",border:`1px solid ${BRAND}33`,fontSize:10,color:BRAND,fontWeight:700,textAlign:"center",cursor:"pointer",transition:"all .2s"}} title="Pull latest data from cloud">⟳ Refresh Now</div>}
        {!collapsed&&!isConfigured&&<div style={{margin:"0 9px 7px",padding:"5px 9px",borderRadius:6,background:"#1a1200",border:"1px solid #f39c1244",fontSize:9,color:"#f39c12",textAlign:"center",lineHeight:1.5}}>Setup cloud sync below</div>}
        <div onClick={()=>setCollapsed(c=>!c)} style={{padding:collapsed?"8px 0":"8px 13px",cursor:"pointer",color:"#444",fontSize:11,display:"flex",alignItems:"center",gap:7,justifyContent:collapsed?"center":"flex-start"}}>{collapsed?"▶":"◀"}{!collapsed&&" Collapse"}</div>
        <div onClick={onLogout} style={{padding:collapsed?"8px 0":"8px 13px",cursor:"pointer",color:"#444",fontSize:11,display:"flex",alignItems:"center",gap:7,justifyContent:collapsed?"center":"flex-start"}}>⊗{!collapsed&&" Logout"}</div>
      </div>
    </div>
    {/* Main */}
    <div className="main-content tab-content" style={{flex:1,padding:24,overflowY:"auto",minWidth:0}}>
      <style>{`@media(max-width:768px){.tab-content{padding-top:68px!important;}}`}</style>
      {tab==="dashboard"&&<DashboardTab applicants={applicants}/>}
      {tab==="passed"&&<AppListTab applicants={applicants} onUpdate={upApp} positions={positions} filterStatus="passed" label="Passed Applicants" cardActions={passedActions}/>}
      {tab==="initial"&&<AppListTab applicants={applicants} onUpdate={upApp} positions={positions} filterStatus="initial-interview" label="Initial Interview" cardActions={initialActions}/>}
      {tab==="final"&&<AppListTab applicants={applicants} onUpdate={upApp} positions={positions} filterStatus="final-interview" label="Final Interview" cardActions={finalActions}/>}
      {tab==="hired"&&<HiredTab applicants={applicants} onUpdate={upApp} positions={positions}/>}
      {tab==="waiting"&&<WaitingListTab applicants={applicants} onUpdate={upApp} positions={positions}/>}
      {tab==="failed"&&<AppListTab applicants={applicants} onUpdate={upApp} positions={positions} filterStatus="failed" label="Failed Applicants" cardActions={()=>null}/>}
      {tab==="departed"&&<DepartedTab applicants={applicants} positions={positions}/>}
      {tab==="org"&&<OrgChartTab org={org} setOrg={setOrg}/>}
      {tab==="managers"&&<ManagersTab managers={managers} setManagers={setManagers} employees={employees} setEmployees={setEmployees}/>}
      {tab==="questionnaire"&&<JobQuestionnaireTab positions={positions} setPositions={setPositions}/>}
    </div>
  </div>);
}

/* ── Root ── */
function App(){
  const[mode,setMode]=useState("home");
  const[positions,setPositions]=useState(DEFAULT_POSITIONS);
  const isConfigured=true; // credentials are set

  // Load positions from cloud in background on mount (non-blocking)
  useEffect(()=>{
    async function loadPositions(){
      let data=null;
      if(isConfigured)data=await cloudRead();
      if(!data)data=lsRead();
      if(data?.positions)setPositions(data.positions);
    }
    loadPositions();
  },[]);

  function goApply(){
    setMode("apply"); // instant — positions already loading in background
  }
  async function handleApply(appData){
    // Save applicant to cloud with retry logic
    // Never use DEFAULT_STATE as fallback — that would wipe existing data!
    try{
      // Retry cloudRead up to 3 times
      let data=null;
      for(let i=0;i<3;i++){
        data=await cloudRead();
        if(data)break;
        await new Promise(r=>setTimeout(r,1000));
      }
      // If cloud failed, use localStorage — but NEVER DEFAULT_STATE
      if(!data)data=lsRead();
      // If still nothing (brand new), use empty state
      if(!data)data={applicants:[],employees:[],managers:[],org:DEFAULT_ORG,positions:DEFAULT_POSITIONS};
      // Append new applicant
      data.applicants=[...(data.applicants||[]),appData];
      // Save to cloud and localStorage
      if(isConfigured)await cloudWrite(data);
      lsWrite(data);
      console.log("✅ Applicant saved:",appData.name);
    }catch(e){
      console.error("handleApply save error",e);
    }
    // Do NOT call setMode — success screen shown by ApplicantModule (step 4)
  }
  if(mode==="apply")return <ApplicantModule positions={positions} onApply={handleApply} onBack={()=>setMode("home")}/>;
  if(mode==="admin-login")return <AdminLogin onLogin={()=>setMode("admin")} onBack={()=>setMode("home")}/>;
  if(mode==="admin")return <AdminDashboard onLogout={()=>setMode("home")}/>;
  return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#080808 0%,#0a150a 50%,#080808 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",width:700,height:700,borderRadius:"50%",background:`radial-gradient(circle,${BRAND}14 0%,transparent 65%)`,top:"50%",left:"50%",transform:"translate(-50%,-50%)",pointerEvents:"none"}}/>
    <div style={{position:"absolute",top:22,right:24}}><Btn onClick={()=>setMode("admin-login")} variant="ghost" size="sm">Admin Dashboard →</Btn></div>
    <div style={{textAlign:"center",maxWidth:520,position:"relative",padding:"0 8px"}}>
      <img src={LOGO} alt="Lumenor Advisory Group" style={{height:88,marginBottom:28,filter:`drop-shadow(0 0 26px ${BRAND}55)`}}/>
      <h1 className="home-title" style={{fontSize:38,fontWeight:900,color:"#eee",marginBottom:10,letterSpacing:-.7,lineHeight:1.15}}>Lumenor Advisory Group</h1>
      <p className="home-subtitle" style={{color:BRAND,fontSize:17,fontWeight:600,marginBottom:42,textShadow:`0 0 18px ${BRAND}88`}}>Your Direct Path to a Better Career. Apply Now.</p>
      <Btn onClick={goApply} style={{fontSize:16,padding:"15px 48px",borderRadius:13,boxShadow:`0 0 28px ${BRAND}55,0 0 56px ${BRAND}22`}} className="apply-btn">Apply Now →</Btn>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
